<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Request — Barangay Management System</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="sidebar-backdrop"></div>
  <button class="mobile-hamburger-resident" id="hamburgerResident">&#9776;</button>

  <div class="resident-sidebar">
    <div class="sidebar-header" style="gap:0;flex-direction:column;text-align:center;">
      <img src="/static/img/logo.png" alt="Logo" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid var(--secondary);">
      <h2>Barangay 779</h2>
      <small>Management System</small>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Resident Portal</div>
      <a href="/resident/home"><span class="icon">&#128240;</span> Announcements</a>
      <a href="/resident/requests"><span class="icon">&#128203;</span> My Requests</a>
      <a href="/resident/file-request" class="active"><span class="icon">&#10133;</span> File Request</a>
      <a href="/resident/complaints"><span class="icon">&#128220;</span> My Complaints</a>
      <a href="/resident/file-complaint"><span class="icon">&#10133;</span> File Complaint</a>
      <a href="/resident/household"><span class="icon">&#127968;</span> My Household</a>
      <div class="nav-section">Administration</div>
      <a href="/admin/dashboard" id="adminLinkSidebar" style="display:none;"><span class="icon">&#128736;</span> Admin Panel</a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar">R</div>
      <div class="user-info">
        <div class="name" id="sidebarNameResident">User</div>
        <div class="role" id="roleTagResident">Resident</div>
      </div>
      <button type="button" class="logout-btn" title="Logout">&#128682;</button>
    </div>
  </div>

  <div class="resident-content">
    <div class="page-header">
      <h1>File a Document Request</h1>
    </div>

    <div class="card" style="max-width:600px;margin:0 auto;">
      <div class="card-header"><h3>Request Form</h3></div>
      <div style="padding:24px;">
        <form id="requestForm">
          <div class="form-group">
            <label>Document Type</label>
            <select id="docType" required>
              <option value="">— Select Document —</option>
              <option value="Barangay Clearance">Barangay Clearance</option>
              <option value="Certificate of Residency">Certificate of Residency</option>
              <option value="Certificate of Indigency">Certificate of Indigency</option>
              <option value="Business Permit Endorsement">Business Permit Endorsement</option>
              <option value="Certificate of Good Moral">Certificate of Good Moral</option>
              <option value="Barangay ID">Barangay ID</option>
            </select>
          </div>
          <div class="form-group">
            <label>Purpose (optional)</label>
            <textarea id="purpose" rows="3" placeholder="e.g. Employment requirement, school enrollment..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Submit Request</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const s = await api('/api/session');
      if (!s || !s.logged_in) { window.location.href = '/login'; return; }
      document.getElementById('sidebarNameResident').textContent = s.username;
      const roleTag = document.getElementById('roleTagResident');
      if (roleTag) {
        roleTag.textContent = s.role;
        if (s.role !== 'resident') roleTag.style.color = 'var(--secondary)';
      }
      const adminLink = document.getElementById('adminLinkSidebar');
      if (adminLink && s.role !== 'resident') adminLink.style.display = 'flex';

      const hamburger = document.getElementById('hamburgerResident');
      const sidebar = document.querySelector('.resident-sidebar');
      const backdrop = document.querySelector('.sidebar-backdrop');
      if (hamburger && sidebar) {
        hamburger.addEventListener('click', function() {
          sidebar.classList.toggle('open');
          if (backdrop) backdrop.classList.toggle('show');
        });
        if (backdrop) {
          backdrop.addEventListener('click', function() {
            sidebar.classList.remove('open');
            backdrop.classList.remove('show');
          });
        }
      }
    });

    document.getElementById('requestForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = {
        document_type: document.getElementById('docType').value,
        purpose: document.getElementById('purpose').value
      };
      if (!data.document_type) {
        showToast('Please select a document type', 'error');
        return;
      }
      const res = await api('/api/requests', { method: 'POST', body: data });
      if (res) {
        showToast('Request submitted successfully!');
        document.getElementById('requestForm').reset();
      }
    });
  </script>
</body>
</html>
