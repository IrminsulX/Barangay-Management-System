{% extends "resident/layout.html" %}
{% block title %}My Requests{% endblock %}
{% block content %}
<div class="page-header">
  <h1>My Document Requests</h1>
</div>

<div class="card">
  <div class="card-header">
    <h3>Request History</h3>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Document Type</th>
          <th>Purpose</th>
          <th>Date Requested</th>
          <th>Date Released</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="reqBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  function pageReady() { loadMyRequests(); }

  async function loadMyRequests() {
    const data = await api('/api/requests') || [];
    const tbody = document.getElementById('reqBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No requests yet. <a href="/resident/file-request">File one now</a></p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `<tr>
      <td><strong>${r.document_type}</strong></td>
      <td>${r.purpose || '—'}</td>
      <td>${formatDate(r.date_requested)}</td>
      <td>${formatDate(r.date_released)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('');
  }
</script>
{% endblock %}
