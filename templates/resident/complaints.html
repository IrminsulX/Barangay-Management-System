{% extends "resident/layout.html" %}
{% block title %}My Complaints{% endblock %}
{% block content %}
<div class="page-header">
  <h1>My Complaints</h1>
</div>

<div class="card">
  <div class="card-header">
    <h3>Complaint History</h3>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Case #</th>
          <th>Respondent</th>
          <th>Incident Details</th>
          <th>Date Filed</th>
          <th>Status</th>
          <th>Resolution</th>
        </tr>
      </thead>
      <tbody id="compBody"></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  function pageReady() { loadComplaints(); }

  async function loadComplaints() {
    const data = await api('/api/blotter') || [];
    const tbody = document.getElementById('compBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No complaints filed. <a href="/resident/file-complaint">File one now</a></p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(b => `<tr>
      <td><span class="case-number">#${b.id}</span></td>
      <td><strong>${b.respondent_name}</strong></td>
      <td class="text-truncate">${b.incident_details}</td>
      <td>${formatDate(b.date_filed)}</td>
      <td>${statusBadge(b.status)}</td>
      <td>${b.resolution_notes || '—'}</td>
    </tr>`).join('');
  }
</script>
{% endblock %}
