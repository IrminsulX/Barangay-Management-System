<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Complaint — Barangay Management System</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="sidebar-backdrop"></div>
  <button class="mobile-hamburger-resident" id="hamburgerResident">&#9776;</button>

  <div class="resident-sidebar">
    <div class="sidebar-header" style="gap:0;flex-direction:column;text-align:center;">
      <img src="/static/img/logo.png" alt="Logo" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid var(--secondary);">
      <h2>Barangay 779</h2>
      <small>Management System</small>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Resident Portal</div>
      <a href="/resident/home"><span class="icon">&#128240;</span> Announcements</a>
      <a href="/resident/requests"><span class="icon">&#128203;</span> My Requests</a>
      <a href="/resident/file-request"><span class="icon">&#10133;</span> File Request</a>
      <a href="/resident/complaints"><span class="icon">&#128220;</span> My Complaints</a>
      <a href="/resident/file-complaint" class="active"><span class="icon">&#10133;</span> File Complaint</a>
      <a href="/resident/household"><span class="icon">&#127968;</span> My Household</a>
      <div class="nav-section">Administration</div>
      <a href="/admin/dashboard" id="adminLinkSidebar" style="display:none;"><span class="icon">&#128736;</span> Admin Panel</a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar">R</div>
      <div class="user-info">
        <div class="name" id="sidebarNameResident">User</div>
        <div class="role" id="roleTagResident">Resident</div>
      </div>
      <button type="button" class="logout-btn" title="Logout">&#128682;</button>
    </div>
  </div>

  <div class="resident-content">
    <div class="page-header">
      <h1>File a Complaint / Incident Report</h1>
    </div>

    <div class="card" style="max-width:600px;margin:0 auto;">
      <div class="card-header"><h3>Complaint Form</h3></div>
      <div style="padding:24px;">
        <form id="complaintForm">
          <div class="form-group">
            <label>Respondent Name</label>
            <input type="text" id="respondent" placeholder="Full name of person/complaint against" required>
          </div>
          <div class="form-group">
            <label>Incident Details</label>
            <textarea id="incidentDetails" rows="4" placeholder="Describe what happened, include as much detail as possible..." required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Incident Date/Time (optional)</label>
              <input type="datetime-local" id="incidentDate">
            </div>
            <div class="form-group">
              <label>Incident Location (optional)</label>
              <input type="text" id="incidentLocation" placeholder="Where did it happen?">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Submit Complaint</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const s = await api('/api/session');
      if (!s || !s.logged_in) { window.location.href = '/login'; return; }
      document.getElementById('sidebarNameResident').textContent = s.username;
      const roleTag = document.getElementById('roleTagResident');
      if (roleTag) {
        roleTag.textContent = s.role;
        if (s.role !== 'resident') roleTag.style.color = 'var(--secondary)';
      }
      const adminLink = document.getElementById('adminLinkSidebar');
      if (adminLink && s.role !== 'resident') adminLink.style.display = 'flex';

      const hamburger = document.getElementById('hamburgerResident');
      const sidebar = document.querySelector('.resident-sidebar');
      const backdrop = document.querySelector('.sidebar-backdrop');
      if (hamburger && sidebar) {
        hamburger.addEventListener('click', function() {
          sidebar.classList.toggle('open');
          if (backdrop) backdrop.classList.toggle('show');
        });
        if (backdrop) {
          backdrop.addEventListener('click', function() {
            sidebar.classList.remove('open');
            backdrop.classList.remove('show');
          });
        }
      }
    });

    document.getElementById('complaintForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = {
        respondent_name: document.getElementById('respondent').value,
        incident_details: document.getElementById('incidentDetails').value,
        incident_date: document.getElementById('incidentDate').value || null,
        incident_location: document.getElementById('incidentLocation').value || null
      };
      if (!data.respondent_name || !data.incident_details) {
        showToast('Please fill in all required fields', 'error');
        return;
      }
      const res = await api('/api/blotter', { method: 'POST', body: data });
      if (res) {
        showToast('Complaint filed successfully!');
        document.getElementById('complaintForm').reset();
      }
    });
  </script>
</body>
</html>
