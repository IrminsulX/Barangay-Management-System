{% extends "resident/layout.html" %}
{% block title %}My Household{% endblock %}
{% block content %}
<div class="page-header">
  <h1>My Household</h1>
</div>

<div id="householdContainer">
  <div class="empty-state"><p>Loading household information...</p></div>
</div>

<div class="modal-overlay" id="addMemberModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Household Member</h3>
      <button class="modal-close" onclick="closeModal('addMemberModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="mFullName" required>
        </div>
        <div class="form-group">
          <label>Birthdate</label>
          <input type="date" id="mBirthdate" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Sex</label>
          <select id="mSex">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label>Civil Status</label>
          <select id="mCivilStatus">
            <option value="Single">Single</option>
            <option value="Married">Married</option>
            <option value="Widowed">Widowed</option>
            <option value="Divorced">Divorced</option>
            <option value="Separated">Separated</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" id="mContact" placeholder="09XX-XXX-XXXX">
      </div>
      <div class="form-group">
        <label>Email <span class="field-optional">optional</span></label>
        <input type="email" id="mEmail" placeholder="member@example.com">
      </div>
      <div class="section-divider">ACCOUNT LOGIN CREDENTIALS</div>
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="mUsername" placeholder="For portal login">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="mPassword" placeholder="Min. 8 characters, with letters and numbers" pattern="(?=.*[A-Za-z])(?=.*\d).{8,}" title="At least 8 characters with letters and numbers">
        </div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="mVoter" value="1">
        <label for="mVoter">Registered Voter</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addMemberModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addMember()">Add Member</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  function pageReady() { loadHousehold(); }

  async function loadHousehold() {
    const data = await api('/api/my-household');
    const container = document.getElementById('householdContainer');
    if (!data || !data.household) {
      container.innerHTML = `
        <div class="card">
          <div class="empty-state">
            <div class="empty-icon">&#127968;</div>
            <p>You are not assigned to any household yet.</p>
            <p style="font-size:13px;margin-top:8px;">Please contact the Barangay Hall to update your household information.</p>
          </div>
        </div>`;
      return;
    }
    const h = data.household;
    const me = h.current_resident;
    container.innerHTML = `
      <div class="card" style="margin-bottom:20px;">
        <div class="card-header">
          <h3>${h.household_code} — ${h.address}</h3>
          <button class="btn btn-primary" onclick="openModal('addMemberModal')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Member
          </button>
        </div>
        <div style="padding:16px 20px;">
          <p><strong>Head of Household:</strong> ${h.head_name || 'Not assigned'}</p>
          <p><strong>Address:</strong> ${h.address}</p>
          <p><strong>Total Members:</strong> ${h.member_count}</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Household Members</h3>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Full Name</th>
                <th>Birthdate</th>
                <th>Age</th>
                <th>Sex</th>
                <th>Civil Status</th>
                <th>Contact</th>
                <th>Voter</th>
              </tr>
            </thead>
            <tbody>
              ${h.members.map(m => `
                <tr${m.id === me.id ? ' style="background:#f0f7ff;"' : ''}>
                  <td><strong>${m.full_name}</strong>${m.id === h.head_resident_id ? ' (Head)' : ''}${m.id === me.id ? ' <em>(You)</em>' : ''}</td>
                  <td>${formatDate(m.birthdate)}</td>
                  <td>${computeAge(m.birthdate)}</td>
                  <td>${m.sex}</td>
                  <td>${m.civil_status}</td>
                  <td>${m.contact_number || '—'}</td>
                  <td>${m.voter_status ? '&#10004;' : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  async function addMember() {
    const data = {
      full_name: document.getElementById('mFullName').value,
      birthdate: document.getElementById('mBirthdate').value,
      sex: document.getElementById('mSex').value,
      civil_status: document.getElementById('mCivilStatus').value,
      contact_number: document.getElementById('mContact').value,
      email: document.getElementById('mEmail').value,
      username: document.getElementById('mUsername').value,
      password: document.getElementById('mPassword').value,
      voter_status: document.getElementById('mVoter').checked ? 1 : 0
    };
    if (!data.full_name || !data.birthdate) {
      showToast('Full name and birthdate are required', 'error');
      return;
    }
    const res = await api('/api/my-household/members', { method: 'POST', body: data });
    if (res) {
      showToast('New member added to household!');
      closeModal('addMemberModal');
      document.getElementById('mFullName').value = '';
      document.getElementById('mBirthdate').value = '';
      document.getElementById('mSex').value = 'Male';
      document.getElementById('mCivilStatus').value = 'Single';
      document.getElementById('mContact').value = '';
      document.getElementById('mEmail').value = '';
      document.getElementById('mUsername').value = '';
      document.getElementById('mPassword').value = '';
      document.getElementById('mVoter').checked = false;
      loadHousehold();
    }
  }
</script>
{% endblock %}
