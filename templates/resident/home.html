{% extends "resident/layout.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Announcements & Events</h1>
</div>
<div id="announcementsContainer" class="announcements-grid"></div>
{% endblock %}
{% block scripts %}
<script>
  function pageReady() { loadAnnouncements(); }

  async function loadAnnouncements() {
    const data = await api('/api/announcements') || [];
    const container = document.getElementById('announcementsContainer');
    if (!data.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128240;</div><p>No announcements yet</p></div>';
      return;
    }
    container.innerHTML = data.map(a => {
      const catClass = (a.category || 'General').toLowerCase().replace(/ & /g, '-').replace(/\s+/g, '-');
      return `<div class="announcement-card">
        <span class="ann-category ${catClass}">${a.category}</span>
        <h3>${a.title}</h3>
        <p>${a.description}</p>
        <div class="ann-meta">
          <span>&#128197; ${formatDate(a.event_date) || 'No date'}</span>
          <span>&#128339; ${formatDate(a.created_at)}</span>
        </div>
      </div>`;
    }).join('');
  }
</script>
{% endblock %}
