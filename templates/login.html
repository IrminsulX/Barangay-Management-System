<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Barangay Management System</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/css/base.css?v=19">
  <link rel="stylesheet" href="/static/css/login.css?v=19">
</head>
<body class="login-page">
  <div class="login-bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <main class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <img src="/static/img/logo.png" alt="Barangay 779" class="login-logo-img">
      </div>
      <h1>Barangay 779</h1>
      <p class="login-subtitle">Management System — Sign In</p>
    </div>
    <div class="login-error" id="loginError" role="alert">
      <span class="login-error-icon">!</span>
      <span id="loginErrorText"></span>
    </div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn login-btn" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner"></span>
      </button>
    </form>
    <p class="login-footer">Barangay Management System v1.0</p>
  </main>
  <script src="/static/js/main.js?v=19"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      const errText = document.getElementById('loginErrorText');
      btn.classList.add('loading');
      err.classList.remove('show');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          if (data.csrf_token) _csrfToken = data.csrf_token;
          window.location.href = data.role === 'resident'
            ? '/resident/home' : '/admin/dashboard';
        } else {
          errText.textContent = data.error || 'Invalid username or password';
          err.classList.add('show');
        }
      } catch (e) {
        if (e instanceof TypeError && e.message.includes('fetch')) {
          errText.textContent = 'Connection error. Please try again.';
        } else {
          errText.textContent = 'Connection error. Please try again.';
        }
        err.classList.add('show');
      } finally {
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
