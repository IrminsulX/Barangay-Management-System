{% extends "admin/layout.html" %}
{% block title %}Requests{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Document Requests</h1>
    <div class="breadcrumb">Admin / <span>Requests</span></div>
  </div>
  <a href="/api/export/requests" class="btn btn-secondary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export CSV
  </a>
</div>

<div class="card">
  <div class="card-header">
    <h3>All Requests</h3>
    <div class="card-actions">
      <select id="statusFilter" onchange="loadRequests()" class="filter-select">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Processing">Processing</option>
        <option value="Ready">Ready</option>
        <option value="Released">Released</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Resident</th>
          <th>Document Type</th>
          <th>Purpose</th>
          <th>Date Requested</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="requestsBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="statusModal">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h3>Update Request Status</h3>
      <button class="modal-close" onclick="closeModal('statusModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="statusRequestId">
      <div class="form-group">
        <label>Status</label>
        <select id="statusSelect">
          <option value="Pending">Pending</option>
          <option value="Processing">Processing</option>
          <option value="Ready">Ready</option>
          <option value="Released">Released</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes <span class="field-optional">optional</span></label>
        <textarea id="statusNotes" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateRequestStatus()">Update</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  function pageReady() { loadRequests(); }

  async function loadRequests() {
    const statusFilter = document.getElementById('statusFilter').value;
    const data = await api('/api/requests') || [];
    const tbody = document.getElementById('requestsBody');
    const filtered = statusFilter ? data.filter(r => r.status === statusFilter) : data;
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No requests found</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(r => `<tr>
      <td><span class="case-number">#${r.id}</span></td>
      <td><strong>${r.resident_name}</strong></td>
      <td>${r.document_type}</td>
      <td>${r.purpose || '—'}</td>
      <td>${formatDate(r.date_requested)}</td>
      <td>${statusBadge(r.status)}</td>
      <td class="actions">
        <button class="btn btn-sm btn-primary update-req-btn" data-id="${r.id}" data-status="${r.status}" data-notes="${(r.notes||'').replace(/"/g,'&quot;').replace(/\n/g,'\\n')}">Update</button>
        <button class="btn btn-sm btn-info" onclick="printRequest(${r.id})">Print</button>
      </td>
    </tr>`).join('');
    document.querySelectorAll('.update-req-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.getElementById('statusRequestId').value = this.dataset.id;
        document.getElementById('statusSelect').value = this.dataset.status;
        document.getElementById('statusNotes').value = this.dataset.notes;
        openModal('statusModal');
      });
    });
  }

  async function updateRequestStatus() {
    const id = document.getElementById('statusRequestId').value;
    const status = document.getElementById('statusSelect').value;
    const notes = document.getElementById('statusNotes').value;
    await api(`/api/requests/${id}`, { method: 'PUT', body: { status, notes } });
    showToast(`Request #${id} updated to ${status}`);
    closeModal('statusModal');
    loadRequests();
  }

  function printRequest(id) {
    window.open(`/api/print/request/${id}`, '_blank', 'width=800,height=600');
  }
</script>
{% endblock %}
