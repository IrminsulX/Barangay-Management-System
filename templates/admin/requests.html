<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests — Barangay Management System</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="sidebar-backdrop"></div>
  <button class="mobile-hamburger" id="hamburger">&#9776;</button>

  <div class="sidebar">
    <div class="sidebar-header" style="gap:0;flex-direction:column;text-align:center;">
      <img src="/static/img/logo.png" alt="Logo" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid var(--secondary);">
      <div>
        <h2>Barangay 779</h2>
        <small>Management System</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/admin/dashboard"><span class="icon">&#9679;</span> Dashboard</a>
      <a href="/admin/residents"><span class="icon">&#128101;</span> Residents</a>
      <a href="/admin/households"><span class="icon">&#127968;</span> Households</a>
      <div class="nav-section">Services</div>
      <a href="/admin/requests" class="active"><span class="icon">&#128203;</span> Requests</a>
      <a href="/admin/blotter"><span class="icon">&#128220;</span> Blotter</a>
      <a href="/admin/announcements"><span class="icon">&#128240;</span> Announcements</a>
      <div class="nav-section">Portal</div>
      <a href="/resident/home"><span class="icon">&#127760;</span> Resident Portal</a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar">A</div>
      <div class="user-info">
        <div class="name" id="sidebarName">User</div>
        <div class="role" id="sidebarRole">admin</div>
      </div>
      <button class="logout-btn" title="Logout">&#128682;</button>
    </div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <div>
        <h1>Document Requests</h1>
        <div class="breadcrumb">Admin / <span>Requests</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>All Requests</h3>
        <div class="card-actions">
          <select id="statusFilter" onchange="loadRequests()" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Ready">Ready</option>
            <option value="Released">Released</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Resident</th>
              <th>Document Type</th>
              <th>Purpose</th>
              <th>Date Requested</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="requestsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Update Status Modal -->
  <div class="modal-overlay" id="statusModal">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <h3>Update Request Status</h3>
        <button class="modal-close" onclick="closeModal('statusModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="statusRequestId">
        <div class="form-group">
          <label>Status</label>
          <select id="statusSelect">
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Ready">Ready</option>
            <option value="Released">Released</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <textarea id="statusNotes" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
        <button class="btn btn-primary" onclick="updateRequestStatus()">Update</button>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadSessionRQ();
      loadRequests();
    });

    async function loadSessionRQ() {
      const s = await api('/api/session');
      if (!s || !s.logged_in) { window.location.href = '/login'; return; }
      document.getElementById('sidebarName').textContent = s.username;
      document.getElementById('sidebarRole').textContent = s.role;
    }

    async function loadRequests() {
      const statusFilter = document.getElementById('statusFilter').value;
      const data = await api('/api/requests') || [];
      const tbody = document.getElementById('requestsBody');
      const filtered = statusFilter ? data.filter(r => r.status === statusFilter) : data;
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No requests found</p></div></td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(r => `<tr>
        <td>#${r.id}</td>
        <td><strong>${r.resident_name}</strong></td>
        <td>${r.document_type}</td>
        <td>${r.purpose || '—'}</td>
        <td>${formatDate(r.date_requested)}</td>
        <td>${statusBadge(r.status)}</td>
        <td class="actions">
          <button class="btn btn-sm btn-primary update-req-btn" data-id="${r.id}" data-status="${r.status}" data-notes="${(r.notes||'').replace(/"/g,'&quot;').replace(/\n/g,'\\n')}">Update</button>
          <button class="btn btn-sm btn-info" onclick="printRequest(${r.id})">Print</button>
        </td>
      </tr>`).join('');
      document.querySelectorAll('.update-req-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.getElementById('statusRequestId').value = this.dataset.id;
          document.getElementById('statusSelect').value = this.dataset.status;
          document.getElementById('statusNotes').value = this.dataset.notes;
          openModal('statusModal');
        });
      });
    }

    async function updateRequestStatus() {
      const id = document.getElementById('statusRequestId').value;
      const status = document.getElementById('statusSelect').value;
      const notes = document.getElementById('statusNotes').value;
      await api(`/api/requests/${id}`, { method: 'PUT', body: { status, notes } });
      showToast(`Request #${id} updated to ${status}`);
      closeModal('statusModal');
      loadRequests();
    }

    function printRequest(id) {
      window.open(`/api/print/request/${id}`, '_blank', 'width=800,height=600');
    }
  </script>
</body>
</html>
