<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Households — Barangay Management System</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="sidebar-backdrop"></div>
  <button class="mobile-hamburger" id="hamburger">&#9776;</button>

  <div class="sidebar">
    <div class="sidebar-header" style="gap:0;flex-direction:column;text-align:center;">
      <img src="/static/img/logo.png" alt="Logo" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid var(--secondary);">
      <div>
        <h2>Barangay 779</h2>
        <small>Management System</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/admin/dashboard"><span class="icon">&#9679;</span> Dashboard</a>
      <a href="/admin/residents"><span class="icon">&#128101;</span> Residents</a>
      <a href="/admin/households" class="active"><span class="icon">&#127968;</span> Households</a>
      <div class="nav-section">Services</div>
      <a href="/admin/requests"><span class="icon">&#128203;</span> Requests</a>
      <a href="/admin/blotter"><span class="icon">&#128220;</span> Blotter</a>
      <a href="/admin/announcements"><span class="icon">&#128240;</span> Announcements</a>
      <div class="nav-section">Portal</div>
      <a href="/resident/home"><span class="icon">&#127760;</span> Resident Portal</a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar">A</div>
      <div class="user-info">
        <div class="name" id="sidebarName">User</div>
        <div class="role" id="sidebarRole">admin</div>
      </div>
      <button class="logout-btn" title="Logout">&#128682;</button>
    </div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <div>
        <h1>Households</h1>
        <div class="breadcrumb">Admin / <span>Households</span></div>
      </div>
      <button class="btn btn-primary" onclick="openHouseholdModal()">+ Add Household</button>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>All Households</h3>
        <div class="card-actions">
          <input type="text" class="search-input" id="searchInput" placeholder="Search households..." oninput="loadHouseholds()">
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Address</th>
              <th>Head of Household</th>
              <th>Members</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="householdsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="householdModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Household</h3>
        <button class="modal-close" onclick="closeModal('householdModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-row">
          <div class="form-group">
            <label>Household Code</label>
            <input type="text" id="hCode" placeholder="e.g. BRGY-006" required>
          </div>
          <div class="form-group">
            <label>Head of Household</label>
            <select id="hHead"><option value="">— None —</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="hAddress" required>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('householdModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveHousehold()">Save</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:500px;">
      <div class="modal-header">
        <h3>Household Details</h3>
        <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadSessionHH();
      loadResidentSelect();
      loadHouseholds();
    });

    async function loadSessionHH() {
      const s = await api('/api/session');
      if (!s || !s.logged_in) { window.location.href = '/login'; return; }
      document.getElementById('sidebarName').textContent = s.username;
      document.getElementById('sidebarRole').textContent = s.role;
    }

    async function loadResidentSelect() {
      const residents = await api('/api/residents') || [];
      document.getElementById('hHead').innerHTML = '<option value="">— None —</option>' +
        residents.map(r => `<option value="${r.id}">${r.full_name}</option>`).join('');
    }

    async function loadHouseholds() {
      const search = document.getElementById('searchInput').value;
      const data = await api(`/api/households?search=${encodeURIComponent(search)}`) || [];
      const tbody = document.getElementById('householdsBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No households found</p></div></td></tr>';
        return;
      }
      tbody.innerHTML = data.map(h => `<tr>
        <td><strong>${h.household_code}</strong></td>
        <td>${h.address}</td>
        <td>${h.head_name || '—'}</td>
        <td>${h.member_count}</td>
        <td class="actions">
          <button class="btn btn-sm btn-info" onclick="viewHousehold(${h.id})">View</button>
          <button class="btn btn-sm btn-warning" onclick="editHousehold(${h.id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteHousehold(${h.id})">Del</button>
        </td>
      </tr>`).join('');
    }

    function openHouseholdModal() {
      document.getElementById('modalTitle').textContent = 'Add Household';
      document.getElementById('editId').value = '';
      document.getElementById('hCode').value = '';
      document.getElementById('hHead').value = '';
      document.getElementById('hAddress').value = '';
      openModal('householdModal');
    }

    async function editHousehold(id) {
      const h = await api(`/api/households/${id}`);
      if (!h) return;
      document.getElementById('modalTitle').textContent = 'Edit Household';
      document.getElementById('editId').value = h.id;
      document.getElementById('hCode').value = h.household_code;
      document.getElementById('hHead').value = h.head_resident_id || '';
      document.getElementById('hAddress').value = h.address;
      openModal('householdModal');
    }

    async function saveHousehold() {
      const id = document.getElementById('editId').value;
      const data = {
        household_code: document.getElementById('hCode').value,
        head_resident_id: document.getElementById('hHead').value || null,
        address: document.getElementById('hAddress').value
      };
      if (!data.household_code || !data.address) {
        showToast('Code and address are required', 'error');
        return;
      }
      if (id) {
        await api(`/api/households/${id}`, { method: 'PUT', body: data });
        showToast('Household updated');
      } else {
        await api('/api/households', { method: 'POST', body: data });
        showToast('Household added');
      }
      closeModal('householdModal');
      loadHouseholds();
    }

    async function deleteHousehold(id) {
      if (!confirm('Delete this household?')) return;
      await api(`/api/households/${id}`, { method: 'DELETE' });
      showToast('Household deleted');
      loadHouseholds();
    }

    async function viewHousehold(id) {
      const h = await api(`/api/households/${id}`);
      if (!h) return;
      let membersHtml = h.members?.length ? h.members.map(m =>
        `<div style="padding:4px 0;border-bottom:1px solid #eee;">${m.full_name} ${m.id === h.head_resident_id ? '<strong>(Head)</strong>' : ''}</div>`
      ).join('') : '<em>No members</em>';
      document.getElementById('detailBody').innerHTML = `
        <div class="form-row" style="margin-bottom:12px;">
          <div><strong>Household Code:</strong><br>${h.household_code}</div>
          <div><strong>Members:</strong><br>${h.member_count}</div>
        </div>
        <div><strong>Address:</strong><br>${h.address}</div>
        <div style="margin-top:12px;"><strong>Head:</strong> ${h.head_name || '—'}</div>
        <div style="margin-top:16px;"><strong>Members:</strong></div>
        <div style="margin-top:4px;">${membersHtml}</div>
      `;
      openModal('detailModal');
    }
  </script>
</body>
</html>
